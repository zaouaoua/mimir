name: Docker build & deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT != '' && secrets.VM_PORT || '22' }}
          source: "deploy/docker-compose.yml"
          target: "/opt/luoja"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT != '' && secrets.VM_PORT || '22' }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            mkdir -p /opt/luoja
            cd /opt/luoja

            # scp-action keeps relative paths
            if [ -f deploy/docker-compose.yml ]; then
              mv -f deploy/docker-compose.yml docker-compose.yml
              rmdir deploy 2>/dev/null || true
            fi

            # Ensure .env exists (created manually from deploy/.env.example)
            if [ ! -f .env ]; then
              echo "Missing /opt/luoja/.env (create it from deploy/.env.example)" >&2
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
