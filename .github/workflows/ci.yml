name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build --if-present

      - name: Docker build
        run: docker build -t mimir:ci .
